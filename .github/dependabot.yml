# .github/dependabot.yml
version: 2
updates:
  # PDF Reader MCP (npm)
  - package-ecosystem: 'npm'
    directory: '/pdf-reader-mcp'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'chore(pdf-reader)'
      include: 'scope'
    rebase-strategy: 'auto'

  # Report Collector (pip/uv)
  - package-ecosystem: 'pip'
    directory: '/report'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'chore(report)'
      include: 'scope'
    rebase-strategy: 'auto'

  # GitHub Actions updates
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(actions)'
      include: 'scope'
    rebase-strategy: 'auto'
